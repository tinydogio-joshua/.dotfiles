# -----------------------------------------------------------------------------
# Shell & Terminal Environment
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
# Change "xterm-256color" to match your host terminal if not using xterm/alacritty/kitty
set -ag terminal-overrides ",xterm-256color:Tc" 

set -g history-limit 10000
set -g mouse on

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display "🔥 tmux config reloaded."

# Open new windows/panes in the current directory
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vim-like Navigation (Uncomment if needed)
# bind-key h select-pane -L
# bind-key j select-pane -D
# bind-key k select-pane -U
# bind-key l select-pane -R

# -----------------------------------------------------------------------------
# UI & Styling
# -----------------------------------------------------------------------------
set-option -g status-position top
set-window-option -g pane-border-format '-'

set -g status-right "#{?client_prefix,🚀 ,}"
set-option -g status-style bg=default

set -g pane-active-border-style fg=green
set -g pane-border-style fg=black

# Toggle Status Bar (Off by default)
bind -n S-down set -g status
set -g status off

# -----------------------------------------------------------------------------
# Neovim Optimizations
# -----------------------------------------------------------------------------
set-option -sg escape-time 10
set-option -g focus-events on

